<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Drawing App</title>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <div class="tool-group">
          <button id="btn-brush" class="tool-btn active" title="Brush (B)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 19l7-7 3 3-7 7-3-3z"/>
              <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
              <path d="M2 2l7.586 7.586"/>
              <circle cx="11" cy="11" r="2"/>
            </svg>
          </button>
          <button id="btn-eraser" class="tool-btn" title="Eraser (E)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 20H7L3 16l10-10 8 8-4 4"/>
              <path d="M6.5 13.5l5-5"/>
            </svg>
          </button>
          <button id="btn-select" class="tool-btn" title="Rect Select (S)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h4M16 4h4M4 4v4M20 4v4M4 16v4M20 16v4M4 20h4M16 20h4" stroke-dasharray="0"/>
            </svg>
          </button>
          <button id="btn-lasso" class="tool-btn" title="Lasso Select (L)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 3C7 3 3 7 3 12c0 3 1.5 5.5 4 7.5"/>
              <path d="M12 3c5 0 9 4 9 9 0 3-1.5 5.5-4 7.5"/>
              <circle cx="10" cy="19" r="2"/>
              <path d="M10 21v-2"/>
            </svg>
          </button>
          <button id="btn-fill" class="tool-btn" title="Paint Bucket (G)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2.5 18.5l9-9 5 5-9 9z"/>
              <path d="M11.5 9.5l2-2 5 5"/>
              <path d="M7.5 5.5l2-2"/>
              <path d="M19 16c1.5 1 2 3 2 3s-1.5-0.5-3 0c-1 .3-1.5 1-1.5 1s0-1.5 1-2.5c.5-.5 1-.7 1.5-.5z"/>
            </svg>
          </button>
        </div>

        <div class="tool-group">
          <select id="brush-type" title="Brush Type">
            <option value="smooth">Smooth</option>
            <option value="pencil">Pencil</option>
            <option value="charcoal">Charcoal</option>
            <option value="airbrush">Airbrush</option>
          </select>
        </div>

        <div class="tool-group">
          <label class="tool-label">
            Size
            <input type="range" id="brush-size" min="1" max="80" value="4" step="0.5" />
            <span id="size-value">4</span>
          </label>
        </div>

        <div class="tool-group">
          <label class="tool-label">
            Opacity
            <input type="range" id="brush-opacity" min="1" max="100" value="100" />
            <span id="opacity-value">100%</span>
          </label>
        </div>

        <div class="tool-group">
          <input type="color" id="color-picker" value="#1a1a1a" title="Color" />
          <div id="swatches">
            <button class="swatch" data-color="#1a1a1a" style="background:#1a1a1a" title="Black"></button>
            <button class="swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
            <button class="swatch" data-color="#ef4444" style="background:#ef4444" title="Red"></button>
            <button class="swatch" data-color="#3b82f6" style="background:#3b82f6" title="Blue"></button>
            <button class="swatch" data-color="#22c55e" style="background:#22c55e" title="Green"></button>
            <button class="swatch" data-color="#f59e0b" style="background:#f59e0b" title="Yellow"></button>
            <button class="swatch" data-color="#8b5cf6" style="background:#8b5cf6" title="Purple"></button>
            <button class="swatch" data-color="#ec4899" style="background:#ec4899" title="Pink"></button>
          </div>
        </div>

        <div class="tool-group">
          <label class="tool-label">
            Smoothing
            <input type="range" id="smoothing" min="0" max="100" value="50" />
          </label>
        </div>


        <div class="tool-group">
          <label class="tool-label">
            <input type="checkbox" id="taper" checked />
            Taper
          </label>
        </div>

        <div class="tool-group">
          <label class="tool-label">
            Size range
            <input type="range" id="size-range" min="100" max="2000" value="100" />
            <span id="size-range-value">1x</span>
          </label>
        </div>

        <div class="tool-group" style="position:relative">
          <button id="btn-curve" class="tool-btn" title="Pressure Curve">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 20 C 8 20, 8 4, 21 4"/>
            </svg>
          </button>
          <div id="curve-popup"></div>
        </div>

        <div class="tool-group">
          <span id="zoom-level" class="zoom-display" title="Ctrl+0 to reset">100%</span>
        </div>

        <div class="tool-group actions">
          <button id="btn-undo" class="tool-btn" title="Undo (Ctrl+Z)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 10h10a5 5 0 0 1 5 5v0a5 5 0 0 1-5 5H8"/>
              <path d="M7 14l-4-4 4-4"/>
            </svg>
          </button>
          <button id="btn-redo" class="tool-btn" title="Redo (Ctrl+Shift+Z)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10H11a5 5 0 0 0-5 5v0a5 5 0 0 0 5 5h5"/>
              <path d="M17 14l4-4-4-4"/>
            </svg>
          </button>
          <button id="btn-clear" class="tool-btn" title="Clear Layer">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18"/>
              <path d="M8 6V4h8v2"/>
              <path d="M5 6l1 14h12l1-14"/>
            </svg>
          </button>
          <button id="btn-save" class="tool-btn" title="Save as PNG">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 15V3"/>
              <path d="M8 11l4 4 4-4"/>
              <path d="M3 17v2a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2"/>
            </svg>
          </button>
          <button id="btn-save-psd" class="tool-btn" title="Save as PSD" style="font-size:10px;font-weight:600">
            PSD
          </button>
        </div>
      </div>

      <div id="workspace">
        <div id="canvas-container">
          <canvas id="canvas"></canvas>
          <canvas id="selection-overlay"></canvas>
        </div>

        <div id="layer-panel">
          <div id="layer-panel-header">
            <span>Layers</span>
            <div>
              <button id="btn-add-layer" class="layer-btn" title="Add Layer">+</button>
              <button id="btn-add-group" class="layer-btn" title="Add Group">&#128193;</button>
              <button id="btn-remove-layer" class="layer-btn" title="Remove">&minus;</button>
            </div>
          </div>
          <div id="layer-list"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
